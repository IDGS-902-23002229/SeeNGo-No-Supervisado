<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SEENGO · Rutinas del hogar</title>
<style>
  :root{
    --bg:#0e0f18; --panel:#171a29; --panel-2:#1e2133; --line:#2b2f45;
    --ink:#e9ebf6; --muted:#868bab;
    --on:#f5b642;      /* encender = luz cálida */
    --off:#5fb6d8;     /* apagar = frío */
    --toggle:#a98cf0;  /* alternar = violeta */
    --alert:#e8705a;
    --ok:#5bd6a0;
    --mono:ui-monospace,"SF Mono","Cascadia Code",Menlo,Consolas,monospace;
    --sans:system-ui,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:radial-gradient(1200px 600px at 70% -10%,#1a1e33 0%,var(--bg) 55%);
    color:var(--ink);font-family:var(--sans);line-height:1.5;-webkit-font-smoothing:antialiased}
  .wrap{max-width:1080px;margin:0 auto;padding:28px 20px 64px}
  .eyebrow{font-family:var(--mono);font-size:11px;letter-spacing:.28em;text-transform:uppercase;
    color:var(--muted)}
  h1{font-size:30px;margin:4px 0 2px;font-weight:650;letter-spacing:-.01em}
  .sub{color:var(--muted);font-size:14px;font-family:var(--mono)}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:20px}
  .grid{display:grid;gap:18px}

  /* alerta ausencia */
  .alerta{display:flex;gap:14px;align-items:flex-start;border-radius:14px;padding:16px 18px;
    margin:22px 0;border:1px solid #4a2620;background:linear-gradient(90deg,#2a1712,#1b1522)}
  .alerta.aviso{border-color:#5a4a1c;background:linear-gradient(90deg,#241f10,#1b1a22)}
  .alerta .dot{width:10px;height:10px;border-radius:50%;background:var(--alert);margin-top:6px;
    box-shadow:0 0 0 4px rgba(232,112,90,.15)}
  .alerta.aviso .dot{background:#e6b93e;box-shadow:0 0 0 4px rgba(230,185,62,.15)}
  .alerta h3{margin:0 0 2px;font-size:15px}
  .alerta p{margin:0;color:var(--muted);font-size:13px}

  /* layout hero */
  .hero{display:grid;grid-template-columns:minmax(0,1fr) 300px;gap:18px;margin-top:8px}
  @media(max-width:820px){.hero{grid-template-columns:1fr}}
  .dialwrap{display:flex;flex-direction:column;align-items:center;gap:14px}
  svg .tick{stroke:var(--line);stroke-width:1}
  svg .ticklab{fill:var(--muted);font-family:var(--mono);font-size:11px}
  svg .ring{fill:none;stroke:#22263a;stroke-width:1}
  .rut{cursor:pointer;transition:opacity .2s}
  .rut.dim{opacity:.18}

  .views{display:flex;gap:6px;flex-wrap:wrap;justify-content:center}
  .views button{font-family:var(--mono);font-size:12px;letter-spacing:.04em;color:var(--muted);
    background:var(--panel-2);border:1px solid var(--line);border-radius:999px;padding:7px 13px;
    cursor:pointer}
  .views button[aria-pressed="true"]{color:var(--ink);border-color:#4a5378;background:#242a44}
  .views button:focus-visible{outline:2px solid #6ea8ff;outline-offset:2px}

  /* selector de fuente de datos (Atlas vivo / ejemplo local) */
  .fuentes{display:flex;gap:8px;flex-wrap:wrap;margin:14px 0 2px}
  .fuentes button{font-family:var(--sans);font-size:13px;color:var(--muted);background:var(--panel);
    border:1px solid var(--line);border-radius:11px;padding:9px 14px;cursor:pointer;
    display:flex;align-items:center;gap:9px}
  .fuentes button[aria-pressed="true"]{color:var(--ink);border-color:#4a5378;background:var(--panel-2)}
  .fuentes button:focus-visible{outline:2px solid #6ea8ff;outline-offset:2px}
  .fuentes .fdot{width:8px;height:8px;border-radius:50%;background:var(--muted);flex:0 0 auto}
  .fuentes button[data-f="atlas"] .fdot{background:var(--ok)}
  .fuentes button[data-f="local"] .fdot{background:var(--toggle)}
  .fuentes .fsub{font-family:var(--mono);font-size:10px;color:var(--muted)}

  .legend{display:flex;gap:16px;font-size:12px;color:var(--muted);font-family:var(--mono)}
  .legend i{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:6px;
    vertical-align:middle}

  /* panel lateral: lista de rutinas confirmadas de la vista */
  .list h4{margin:2px 0 12px;font-size:12px;font-family:var(--mono);letter-spacing:.2em;
    text-transform:uppercase;color:var(--muted)}
  .item{display:flex;align-items:center;gap:11px;padding:9px 8px;border-radius:10px;cursor:pointer}
  .item:hover{background:var(--panel-2)}
  .item .sw{width:9px;height:9px;border-radius:50%;flex:0 0 auto}
  .item .h{font-family:var(--mono);font-size:15px;min-width:52px}
  .item .d{font-size:12.5px;color:var(--muted);flex:1;min-width:0;overflow:hidden;
    text-overflow:ellipsis;white-space:nowrap}
  .badge{font-family:var(--mono);font-size:10px;letter-spacing:.08em;padding:2px 7px;border-radius:6px;
    border:1px solid var(--line)}
  .b-ALTA{color:#7ff0c0;border-color:#2c5a48}
  .b-MEDIA{color:#f5d67a;border-color:#5a4f2a}
  .b-BAJA{color:#9aa0bf}
  .empty{color:var(--muted);font-size:13px;font-family:var(--mono)}

  /* funnel */
  .funnel{display:flex;gap:10px;align-items:stretch;margin-top:4px}
  .fstep{flex:1;background:var(--panel-2);border:1px solid var(--line);border-radius:12px;padding:14px}
  .fstep .n{font-family:var(--mono);font-size:24px;font-weight:600}
  .fstep .l{font-size:12px;color:var(--muted);margin-top:2px}
  .fstep .arrow{color:var(--muted)}

  /* detalle por stream */
  .devgroup{margin-top:26px}
  .devhead{font-family:var(--mono);font-size:12px;letter-spacing:.16em;text-transform:uppercase;
    color:var(--muted);margin:22px 0 10px;border-bottom:1px solid var(--line);padding-bottom:6px}
  .track{position:relative;height:44px;margin:8px 0 4px;background:
    repeating-linear-gradient(90deg,transparent 0,transparent calc(100%/12 - 1px),
    var(--line) calc(100%/12 - 1px),var(--line) calc(100%/12));border-radius:8px;
    border:1px solid var(--line);background-color:#12142099}
  .band{position:absolute;top:6px;bottom:6px;border-radius:6px;opacity:.9}
  .band.un{opacity:.32;border:1px dashed #5a6088}
  .trlabels{display:flex;justify-content:space-between;font-family:var(--mono);font-size:10px;
    color:var(--muted);margin-top:2px}
  .streamrow{padding:12px 14px;border:1px solid var(--line);border-radius:12px;background:var(--panel);
    margin-bottom:10px}
  .streamtop{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap}
  .streamtop .name{font-weight:600;font-size:14px}
  .streamtop .act{font-family:var(--mono);font-size:11px;padding:1px 7px;border-radius:6px;border:1px solid var(--line)}
  .streamtop .meta{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--muted)}
  .tag{font-family:var(--mono);font-size:11px;color:var(--muted);margin-right:10px}

  /* mapa de calor día x hora, por stream */
  .heatmap{margin-top:12px}
  .heatmap .hmtitle{font-family:var(--mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;
    color:var(--muted);margin-bottom:6px}
  .hmgrid{display:grid;grid-template-columns:24px repeat(24,1fr);gap:2px;align-items:center}
  .hmrow-label{font-family:var(--mono);font-size:9px;color:var(--muted);text-align:right;padding-right:4px}
  .hmcell{height:11px;border-radius:2px;background:#2b2f4555}
  .hmhours{grid-column:2/-1;display:grid;grid-template-columns:repeat(24,1fr);
    font-family:var(--mono);font-size:8px;color:var(--muted);margin-top:3px}
  .hmhours span{text-align:center}
  .drop{border:1px dashed var(--line);border-radius:12px;padding:26px;text-align:center;color:var(--muted);
    font-family:var(--mono);font-size:13px;margin-top:20px}
  a.mono{color:#8fb4ff;font-family:var(--mono);text-decoration:none}
  @media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
</style>
</head>
<body>
<div class="wrap">
  <div class="eyebrow">SEENGO · detector de rutinas</div>
  <h1>El día de esta casa</h1>
  <div class="sub" id="subtitle">cargando…</div>

  <div class="fuentes" id="fuentes" role="group" aria-label="Fuente de datos" style="display:none"></div>

  <div id="alertHost"></div>

  <div class="hero">
    <div class="card dialwrap">
      <div class="views" id="views" role="group" aria-label="Vista">
        <button data-v="entre_semana" aria-pressed="true">Entre semana</button>
        <button data-v="fin_de_semana" aria-pressed="false">Fin de semana</button>
        <button data-v="semana_completa" aria-pressed="false">Semana completa</button>
      </div>
      <svg id="dial" viewBox="0 0 560 560" width="100%" style="max-width:460px" role="img"
           aria-label="Reloj de 24 horas con las rutinas detectadas"></svg>
      <div class="legend">
        <span><i style="background:var(--on)"></i>encender</span>
        <span><i style="background:var(--off)"></i>apagar</span>
        <span><i style="background:var(--toggle)"></i>alternar</span>
      </div>
    </div>
    <div class="card list">
      <h4>Rutinas confirmadas · <span id="viewName">entre semana</span></h4>
      <div id="rutList"></div>
    </div>
  </div>

  <div class="card" style="margin-top:18px">
    <div class="eyebrow" style="margin-bottom:10px">De ruido a señal</div>
    <div class="funnel" id="funnel"></div>
  </div>

  <div class="devgroup" id="detail"></div>

  <div class="drop" id="drop">
    ¿Vacío? Genera los datos con el consumidor, o arrastra aquí un
    <span style="color:var(--ink)">resultados.json</span>.
  </div>
</div>

<script src="resultados.js"></script>
<script>
const COL = {on:getVar('--on'), off:getVar('--off'), toggle:getVar('--toggle')};
const INK=getVar('--ink'), MUT=getVar('--muted'), MONO=getVar('--mono')||'monospace';
function getVar(n){return getComputedStyle(document.documentElement).getPropertyValue(n).trim()||'#888';}
const CX=280, CY=280, R=220;
let DATA=null, VIEW='entre_semana';
let FUENTES={}, FUENTE=null;   // FUENTES[clave] = resultado del modelo

function pt(hora, r){ // 0h arriba, sentido horario
  const a = (hora/24)*2*Math.PI;
  return [CX + r*Math.sin(a), CY - r*Math.cos(a)];
}
function svgEl(t,attrs){const e=document.createElementNS('http://www.w3.org/2000/svg',t);
  for(const k in attrs)e.setAttribute(k,attrs[k]);return e;}

function drawDial(){
  const svg=document.getElementById('dial'); svg.innerHTML='';
  svg.appendChild(svgEl('circle',{cx:CX,cy:CY,r:R+22,class:'ring'}));
  svg.appendChild(svgEl('circle',{cx:CX,cy:CY,r:R-40,class:'ring'}));
  // ticks y etiquetas cada 2h
  for(let h=0;h<24;h+=2){
    const [x1,y1]=pt(h,R+22),[x2,y2]=pt(h,R+12);
    svg.appendChild(svgEl('line',{x1,y1,x2,y2,class:'tick'}));
    const [lx,ly]=pt(h,R+38);
    const t=svgEl('text',{x:lx,y:ly+4,'text-anchor':'middle',class:'ticklab'});
    t.textContent=String(h).padStart(2,'0'); svg.appendChild(t);
  }
  // glow para "on" (construido en el namespace SVG correcto)
  const defs=svgEl('defs',{});
  const filt=svgEl('filter',{id:'glow',x:'-50%',y:'-50%',width:'200%',height:'200%'});
  filt.appendChild(svgEl('feGaussianBlur',{stdDeviation:4,result:'b'}));
  const merge=svgEl('feMerge',{});
  merge.appendChild(svgEl('feMergeNode',{in:'b'}));
  merge.appendChild(svgEl('feMergeNode',{in:'SourceGraphic'}));
  filt.appendChild(merge); defs.appendChild(filt); svg.appendChild(defs);

  const streams=(DATA.streams||[]);
  const rutinas=[];
  streams.forEach(s=>{
    (s.vistas[VIEW]?.rutinas||[]).forEach(r=>{
      if(r.confirmada) rutinas.push({...r,device:s.device,action:s.action});
    });
  });
  rutinas.forEach((r,i)=>{
    const col=COL[r.action]||'#aaa';
    const a0=(r.hora-r.tolerancia_h)/24*2*Math.PI, a1=(r.hora+r.tolerancia_h)/24*2*Math.PI;
    const large=(a1-a0)>Math.PI?1:0;
    const [sx,sy]=pt(r.hora-r.tolerancia_h,R),[ex,ey]=pt(r.hora+r.tolerancia_h,R);
    const arc=svgEl('path',{d:`M ${sx} ${sy} A ${R} ${R} 0 ${large} 1 ${ex} ${ey}`,
      fill:'none',stroke:col,'stroke-width':7,'stroke-linecap':'round',
      class:'rut','data-hora':r.hora.toFixed(3),opacity:.85});
    arc.style.filter = r.action==='on' ? 'url(#glow)' : '';
    svg.appendChild(arc);
    const [dx,dy]=pt(r.hora,R);
    const dot=svgEl('circle',{cx:dx,cy:dy,r:6,fill:col,class:'rut','data-hora':r.hora.toFixed(3)});
    dot.style.filter = r.action==='on' ? 'url(#glow)' : '';
    svg.appendChild(dot);
  });
  drawRutList(rutinas);
  // centro: nº de rutinas
  const c=svgEl('text',{x:CX,y:CY-6,'text-anchor':'middle',fill:INK,
    'font-family':MONO,'font-size':40,'font-weight':600});
  c.textContent=rutinas.length; svg.appendChild(c);
  const c2=svgEl('text',{x:CX,y:CY+18,'text-anchor':'middle',fill:MUT,
    'font-family':MONO,'font-size':12}); c2.textContent='rutinas';
  svg.appendChild(c2);
}

function drawRutList(rutinas){
  const host=document.getElementById('rutList'); host.innerHTML='';
  if(!rutinas.length){host.innerHTML='<div class="empty">Sin rutinas confirmadas en esta vista.</div>';return;}
  rutinas.sort((a,b)=>a.hora-b.hora).forEach((r,i)=>{
    const col=COL[r.action]||'#aaa';
    const el=document.createElement('div'); el.className='item'; el.tabIndex=0;
    el.innerHTML=`<span class="sw" style="background:${col}"></span>`+
      `<span class="h">${r.hora_hhmm}</span>`+
      `<span class="d">${r.device} · ${r.action} ·±${r.tolerancia_hhmm} · ${r.dias_cubiertos}/${r.posibles}d</span>`+
      `<span class="badge b-${r.confianza}">${r.confianza}</span>`;
    const hi=()=>highlight(r.hora);
    el.addEventListener('mouseenter',hi); el.addEventListener('focus',hi);
    el.addEventListener('mouseleave',()=>highlight(null));
    el.addEventListener('blur',()=>highlight(null));
    host.appendChild(el);
  });
}
function highlight(hora){
  const nodes=document.querySelectorAll('#dial .rut');
  if(hora==null){nodes.forEach(n=>n.classList.remove('dim'));return;}
  const key=hora.toFixed(3);
  nodes.forEach(n=>n.classList.toggle('dim', n.getAttribute('data-hora')!==key));
}

function drawFunnel(){
  const m=DATA.meta; const conf=m.eventos_crudos-m.eventos_filtrados_confianza;
  const steps=[
    {n:m.eventos_crudos,l:'eventos crudos'},
    {n:conf,l:'tras filtro de confianza'},
    {n:m.interacciones,l:'interacciones reales (debounce)'},
  ];
  const host=document.getElementById('funnel'); host.innerHTML='';
  steps.forEach((s,i)=>{
    const d=document.createElement('div'); d.className='fstep';
    d.innerHTML=`<div class="n">${s.n.toLocaleString('es-MX')}</div><div class="l">${s.l}</div>`;
    host.appendChild(d);
    if(i<steps.length-1){const a=document.createElement('div');
      a.className='fstep arrow';a.style.flex='0 0 24px';a.style.border='0';a.style.background='none';
      a.style.display='flex';a.style.alignItems='center';a.style.justifyContent='center';
      a.style.fontSize='20px';a.textContent='→';host.appendChild(a);}
  });
}

function drawDetail(){
  const host=document.getElementById('detail'); host.innerHTML='';
  const byDev={};
  DATA.streams.forEach(s=>{(byDev[s.device]=byDev[s.device]||[]).push(s);});
  const orden=Object.keys(byDev).sort();
  for(const dev of orden){
    const h=document.createElement('div'); h.className='devhead'; h.textContent=dev;
    host.appendChild(h);
    byDev[dev].sort((a,b)=>confCount(b)-confCount(a));
    byDev[dev].forEach(s=>{
      const v=s.vistas[VIEW]; const col=COL[s.action]||'#aaa';
      const row=document.createElement('div'); row.className='streamrow';
      const bands=(v.rutinas||[]).map(r=>{
        const left=((r.hora-r.tolerancia_h)/24*100), w=Math.max((2*r.tolerancia_h/24*100),1.2);
        return `<div class="band ${r.confirmada?'':'un'}" title="${r.hora_hhmm} ±${r.tolerancia_hhmm} · ${r.confianza}"
          style="left:${left}%;width:${w}%;background:${r.confirmada?col:'transparent'}"></div>`;
      }).join('');
      const chips=(v.rutinas||[]).map(r=>
        `<span class="tag">${r.confirmada?'✓':'○'} ${r.hora_hhmm} <span class="badge b-${r.confianza}">${r.confianza}</span> ${r.dias_cubiertos}/${r.posibles}d</span>`
      ).join('') || '<span class="tag">sin cluster</span>';
      row.innerHTML=
        `<div class="streamtop"><span class="name">${s.device}</span>`+
        `<span class="act" style="color:${col};border-color:${col}66">${s.action}</span>`+
        `<span class="meta">${s.interacciones} interacciones · ruido ${v.ruido.length}</span></div>`+
        `<div class="track">${bands}</div>`+
        `<div class="trlabels"><span>00</span><span>06</span><span>12</span><span>18</span><span>24</span></div>`+
        `<div style="margin-top:8px">${chips}</div>`+
        `<div class="heatmap"><div class="hmtitle">Mapa semanal · lun–dom, todas las semanas</div>`+
        `<div class="hmhost"></div></div>`;
      host.appendChild(row);
      if(s.mapa_semanal) drawHeatmap(row.querySelector('.hmhost'), s.mapa_semanal, col);
    });
  }
}
function confCount(s){return Object.values(s.vistas).reduce((a,v)=>a+v.rutinas.filter(r=>r.confirmada).length,0);}

const DIAS_SEM=['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];
function drawHeatmap(host, grid, color){
  const max=Math.max(1, ...grid.map(fila=>Math.max(...fila)));
  const wrap=document.createElement('div'); wrap.className='hmgrid';
  DIAS_SEM.forEach((lab,d)=>{
    const l=document.createElement('div'); l.className='hmrow-label'; l.textContent=lab;
    wrap.appendChild(l);
    for(let h=0;h<24;h++){
      const n=grid[d][h];
      const cell=document.createElement('div'); cell.className='hmcell';
      if(n>0){ cell.style.background=color; cell.style.opacity=(0.15+0.85*(n/max)).toFixed(2); }
      cell.title=`${lab} ${String(h).padStart(2,'0')}:00 · ${n} interacci${n===1?'ón':'ones'}`;
      wrap.appendChild(cell);
    }
  });
  host.innerHTML=''; host.appendChild(wrap);
  const hrs=document.createElement('div'); hrs.className='hmhours';
  for(let h=0;h<24;h++){
    const s=document.createElement('span'); s.textContent = h%6===0 ? String(h).padStart(2,'0') : '';
    hrs.appendChild(s);
  }
  host.appendChild(hrs);
}

function renderAll(){
  const m=DATA.meta;
  const info=FUENTE_INFO[FUENTE];
  const pref=info?`${info.label} · `:'';
  document.getElementById('subtitle').textContent=
    `${pref}${m.rango.desde} → ${m.rango.hasta} · ${m.rango.dias_activos} días activos · ${m.tz}`;
  const host=document.getElementById('alertHost'); host.innerHTML='';
  const a=DATA.ausencia_larga;
  if(a && a.nivel!=='ninguno'){
    const el=document.createElement('div'); el.className='alerta '+(a.nivel==='aviso'?'aviso':'');
    el.innerHTML=`<div class="dot"></div><div><h3>${a.nivel==='alerta'?'Alerta de ausencia':'Aviso de ausencia'} · ${a.hueco_maximo_dias} días</h3>`+
      `<p>${a.mensaje}${a.ventana?` (${a.ventana.desde} → ${a.ventana.hasta})`:''}</p></div>`;
    host.appendChild(el);
  }
  drawDial(); drawFunnel(); drawDetail();
}

document.getElementById('views').addEventListener('click',e=>{
  const b=e.target.closest('button'); if(!b)return;
  VIEW=b.dataset.v;
  [...document.querySelectorAll('#views button')].forEach(x=>x.setAttribute('aria-pressed',x===b));
  document.getElementById('viewName').textContent=b.textContent.toLowerCase();
  renderAll();
});

// ---------------------------------------------------------------
// Fuentes de datos. Dos orígenes posibles, elegibles con la pestaña:
//   atlas -> lo que llega de MongoDB Atlas (datos reales, en vivo)
//   local -> el set de ejemplo del repo (referencia)
// Todo el tablero se redibuja según la fuente activa.
// ---------------------------------------------------------------
const FUENTE_INFO={
  atlas:{label:'Atlas',sub:'MongoDB · en vivo'},
  local:{label:'Datos de ejemplo',sub:'referencia'},
  archivo:{label:'Archivo',sub:'arrastrado'},
};
const ORDEN_FUENTES=['atlas','local','archivo'];
let ultimoGen={atlas:null,local:null,archivo:null};

function fuentesDisponibles(){return ORDEN_FUENTES.filter(k=>FUENTES[k]&&FUENTES[k].meta);}

function drawFuentes(){
  const host=document.getElementById('fuentes'); if(!host) return;
  const disp=fuentesDisponibles();
  host.innerHTML='';
  if(disp.length<=1){host.style.display='none';return;}   // una sola fuente: sin pestaña
  host.style.display='flex';
  disp.forEach(k=>{
    const info=FUENTE_INFO[k]||{label:k,sub:''};
    const dias=(FUENTES[k].meta.rango&&FUENTES[k].meta.rango.dias_activos)||0;
    const b=document.createElement('button');
    b.dataset.f=k; b.setAttribute('aria-pressed', String(k===FUENTE));
    b.innerHTML=`<span class="fdot"></span><span>${info.label}</span>`+
      `<span class="fsub">${info.sub} · ${dias} d</span>`;
    b.addEventListener('click',()=>usarFuente(k));
    host.appendChild(b);
  });
}

function usarFuente(f){
  if(!FUENTES[f]||!FUENTES[f].meta) return;
  FUENTE=f; DATA=FUENTES[f]; ultimoGen[f]=DATA.meta.generado||null;
  document.getElementById('drop').style.display='none';
  drawFuentes(); renderAll();
}

function elegirDefault(){
  if(FUENTE&&FUENTES[FUENTE]&&FUENTES[FUENTE].meta) return FUENTE;
  const disp=fuentesDisponibles();
  return disp.includes('atlas')?'atlas':(disp[0]||null);
}

// Acepta un envelope {atlas,local} o un resultado suelto (arrastrado / global viejo).
function cargarEnvelope(env){
  if(env&&(('atlas' in env)||('local' in env))){
    if(env.atlas&&env.atlas.meta) FUENTES.atlas=env.atlas;
    if(env.local&&env.local.meta) FUENTES.local=env.local;
  }else if(env&&env.streams){        // resultado suelto (formato viejo o archivo)
    FUENTES.archivo=env;
  }
  const f=elegirDefault();
  if(f) usarFuente(f); else drawFuentes();
}

// Carga inicial desde resultados.js (formato nuevo o el viejo de una sola fuente).
if(window.SEENGO_FUENTES){cargarEnvelope(window.SEENGO_FUENTES);}
else if(window.SEENGO_RESULTADOS){cargarEnvelope({atlas:window.SEENGO_RESULTADOS});}

// Modo servidor en vivo: sondea /api/fuentes.json cada 2 min, actualiza ambas
// fuentes y sólo re-dibuja la que estás viendo si cambió (meta.generado). En
// file:// el fetch falla en silencio y se queda con el snapshot de resultados.js.
async function seengoVivo(){
  try{
    const r=await fetch('/api/fuentes.json',{cache:'no-store'});
    if(!r.ok) return;
    const env=await r.json();
    let nuevas=false;
    ['atlas','local'].forEach(k=>{
      if(env[k]&&env[k].meta){ if(!FUENTES[k]) nuevas=true; FUENTES[k]=env[k]; }
    });
    if(!FUENTE){const f=elegirDefault(); if(f){usarFuente(f); return;}}
    if(nuevas) drawFuentes();
    const cur=FUENTES[FUENTE];
    const g=cur&&cur.meta&&cur.meta.generado;
    if(cur&&g!==ultimoGen[FUENTE]){ultimoGen[FUENTE]=g;DATA=cur;renderAll();}
  }catch(e){/* sin servidor en vivo: se ignora */}
}
seengoVivo(); setInterval(seengoVivo,120000);

const drop=document.getElementById('drop');
['dragover','dragenter'].forEach(ev=>drop.addEventListener(ev,e=>{e.preventDefault();drop.style.borderColor='#6ea8ff';}));
drop.addEventListener('dragleave',()=>drop.style.borderColor='');
drop.addEventListener('drop',e=>{e.preventDefault();const f=e.dataTransfer.files[0];if(!f)return;
  const rd=new FileReader();rd.onload=()=>{try{cargarEnvelope(JSON.parse(rd.result));}catch(err){alert('JSON inválido');}};
  rd.readAsText(f);});
</script>
